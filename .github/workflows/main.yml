name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: "https://spyrzevebsvmartoijgl.supabase.co"
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "🔄 Executando keep-alive real no banco..."
          
          # Verificar se a chave está configurada
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ ERRO: SUPABASE_ANON_KEY não está configurada!"
            exit 1
          fi
          
          echo "✅ Chave encontrada (tamanho: ${#SUPABASE_ANON_KEY} caracteres)"
          
          # Passo 1: Inserir registro na tabela heartbeat
          echo "📝 Inserindo registro na tabela keepalive_heartbeat..."
          
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${SUPABASE_URL}/rest/v1/keepalive_heartbeat" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"source": "github-actions"}')
          
          # Extrair status HTTP
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          
          echo "📊 Status HTTP: $STATUS"
          if [ -n "$BODY" ]; then
            echo "📄 Resposta: $BODY"
          fi
          
          # Passo 2: Verificar se funcionou
          if [[ "$STATUS" =~ ^(200|201)$ ]]; then
            echo "✅ SUCESSO! Banco de dados realmente acessado."
            echo "🕐 Data: $(date)"
            
            # Passo 3: Limpar registros antigos (manter últimos 5)
            echo "🧹 Limpando registros antigos..."
            curl -s "${SUPABASE_URL}/rest/v1/keepalive_heartbeat?id=not.in.(select id from keepalive_heartbeat order by id desc limit 5)" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -X DELETE > /dev/null 2>&1 || echo "⚠️ Limpeza falhou (não crítico)"
            
            exit 0
          else
            echo "❌ ERRO! Status: $STATUS"
            echo "💡 Possíveis causas:"
            echo "   - Tabela 'keepalive_heartbeat' não existe no Supabase"
            echo "   - Políticas RLS não foram configuradas"
            echo "   - Chave API incorreta"
            exit 1
          fi
