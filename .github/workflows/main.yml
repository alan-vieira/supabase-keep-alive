name: Supabase Keep-Alive

on:
  schedule:
    # Executa a cada 5 dias às 12:00 UTC (9h no horário de Brasília)
    - cron: '0 12 */5 * *'
  workflow_dispatch: # Permite execução manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          URL="https://spyrzevebsvmartoijgl.supabase.co/rest/v1/"
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "Status retornado: $STATUS"
          
          if [[ "$STATUS" =~ ^(200|401|406|403)$ ]]; then
            echo "✅ Sucesso! Projeto mantido ativo."
          else
            echo "⚠️ Status inesperado: $STATUS"
          fi
