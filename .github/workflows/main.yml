name: Supabase Keep-Alive

on:
  schedule:
    # Roda TODO DIA às 12:00 UTC (09:00 BRT). Sem falhas de dias longos.
    - cron: '0 12 * * *' 
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: "https://spyrzevebsvmartoijgl.supabase.co"
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "🔄 Executando keep-alive..."
          
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ ERRO: SUPABASE_ANON_KEY não configurada!"
            exit 1
          fi
          
          # Passo 1: Inserir registro de atividade (Escrita conta como uso real)
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${SUPABASE_URL}/rest/v1/keepalive_heartbeat" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"source": "github-actions-daily"}')
          
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          
          if [[ "$STATUS" =~ ^(200|201)$ ]]; then
            echo "✅ SUCESSO! Status: $STATUS"
            echo "🕐 Data: $(date)"
            
            # NOTA: A etapa de DELETE foi removida intencionalmente. 
            # 1 registro/dia = ~365 registros/ano = menos de 50KB. 
            # Isso é totalmente seguro e não impacta o limite de 500MB do plano free.
            
            exit 0
          else
            echo "❌ ERRO! Status: $STATUS"
            echo "Resposta: $(echo "$RESPONSE" | grep -v "HTTP_STATUS:")"
            exit 1
          fi
